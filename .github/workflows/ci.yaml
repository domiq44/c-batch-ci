name: CI - Dockerfile Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Build builder stage (tests + compilation)
      - name: Build builder stage (tests included)
        run: docker build --target builder -t c-batch-ci:builder .

      # Build final runtime image
      - name: Build final image
        run: docker build -t c-batch-ci:latest .

      # Optional: smoke test
      - name: Smoke test binary
        run: docker run --rm c-batch-ci:latest --help || true

      # Install kubeconform (fast)
      - name: Install kubeconform
        run: |
          curl -L https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz \
            | tar xz
          sudo mv kubeconform /usr/local/bin/

      # Validate Kubernetes manifest offline
      - name: Validate Kubernetes manifest
        run: kubeconform -strict -summary k8s/job.yaml.template
